<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SHΔDØW | YELLOW TITAN MOBILE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://upload-widget.cloudinary.com/global/all.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Cairo:wght@300;900&display=swap');
        
        :root { --primary: #ffcc00; --bg: #050505; }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body, html { 
            background: var(--bg); 
            color: #fff; 
            font-family: 'Cairo', sans-serif; 
            margin: 0; 
            padding: 0; 
            height: 100vh; 
            overflow: hidden; 
            width: 100vw;
        }

        /* حاوية التمرير العمودي (مثل تيك توك) */
        .video-container {
            height: 100vh;
            width: 100vw;
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
            scrollbar-width: none;
            position: relative;
        }
        .video-container::-webkit-scrollbar { display: none; }

        .video-scroll-item {
            height: 100vh;
            width: 100vw;
            scroll-snap-align: start;
            position: relative;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* واجهة المستخدم العائمة */
        .ui-overlay {
            position: absolute;
            bottom: 80px;
            left: 0;
            right: 0;
            padding: 20px;
            background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
            pointer-events: none;
            z-index: 10;
        }

        .side-actions {
            position: absolute;
            right: 15px;
            bottom: 120px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            z-index: 20;
            align-items: center;
        }

        .action-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .icon-circle {
            width: 50px;
            height: 50px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            color: white;
            border: 1px solid rgba(255, 204, 0, 0.3);
            margin-bottom: 5px;
            transition: 0.2s;
        }

        .icon-circle:active { transform: scale(0.9); background: var(--primary); color: #000; }

        .action-label { font-size: 12px; font-weight: bold; text-shadow: 1px 1px 2px #000; }

        /* التنقل العلوي */
        .top-nav {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
            background: linear-gradient(to bottom, rgba(0,0,0,0.7), transparent);
        }

        .logo { font-family: 'Orbitron'; font-weight: 900; color: var(--primary); font-size: 1.4rem; letter-spacing: 2px; }

        /* زر الرفع المركزي */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            width: 100%;
            height: 60px;
            background: rgba(0,0,0,0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            border-top: 1px solid rgba(255, 204, 0, 0.2);
        }

        .upload-trigger {
            background: var(--primary);
            color: #000;
            width: 50px;
            height: 35px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            box-shadow: 0 0 15px rgba(255, 204, 0, 0.4);
            cursor: pointer;
        }

        .user-tag { color: var(--primary); font-family: 'Orbitron'; font-size: 14px; font-weight: 900; margin-bottom: 8px; }
        .video-desc { font-size: 13px; font-weight: 400; max-width: 80%; line-height: 1.4; }

        /* اخفاء التعليقات تماماً كما طلبت */
        #mini-chat, .comment-section { display: none !important; }
    </style>
</head>
<body>

    <nav class="top-nav">
        <div class="logo">SHΔDØW</div>
        <div class="text-[10px] bg-white/10 px-3 py-1 rounded-full border border-yellow-500/50" id="user-id">ID: ---</div>
    </nav>

    <div class="video-container" id="feed-container">
        </div>

    <div class="bottom-nav">
        <div class="upload-trigger" id="mega-upload">
            <i class="fas fa-plus"></i>
        </div>
    </div>

    <script>
        const SHADOW_ID = localStorage.getItem('shadow_uid') || 'TITAN_' + Math.random().toString(36).substr(2, 5).toUpperCase();
        localStorage.setItem('shadow_uid', SHADOW_ID);
        document.getElementById('user-id').innerText = `ID: ${SHADOW_ID}`;

        const firebaseConfig = { databaseURL: "https://project-717e4-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const AD_LINKS = [
            "https://www.effectivegatecpm.com/k60w64w4gk?key=564f3d8cc4ac85949f218179b742495e",
            "https://www.effectivegatecpm.com/bxwxuk2f39?key=566216691dc8b76a740840e94f68f44c"
        ];
        let adToggle = 0;
        function openAd() {
            window.open(AD_LINKS[adToggle], '_blank');
            adToggle = (adToggle + 1) % AD_LINKS.length;
        }

        const CLOUD_NAME = "dssk5tabb", UPLOAD_PRESET = "bjebvo5p";
        const myWidget = cloudinary.createUploadWidget({ cloudName: CLOUD_NAME, uploadPreset: UPLOAD_PRESET }, (err, res) => {
            if (!err && res.event === "success") {
                db.ref('videos/').push({ 
                    url: res.info.secure_url, 
                    sender: SHADOW_ID, 
                    likes: 0, 
                    timestamp: Date.now() 
                });
                openAd();
            }
        });
        document.getElementById("mega-upload").onclick = () => { openAd(); myWidget.open(); };

        db.ref('videos').on('value', (snapshot) => {
            const container = document.getElementById('feed-container');
            const data = snapshot.val();
            if(!data) return;
            container.innerHTML = '';
            
            Object.keys(data).reverse().forEach(id => {
                const vid = data[id];
                const section = document.createElement('div');
                section.className = 'video-scroll-item';
                section.innerHTML = `
                    <video loop playsinline src="${vid.url}" onclick="togglePlay(this)"></video>
                    <div class="side-actions">
                        <div class="action-btn" onclick="toggleLike('${id}')">
                            <div class="icon-circle"><i class="fas fa-heart"></i></div>
                            <span class="action-label">${vid.likes || 0}</span>
                        </div>
                        <div class="action-btn" onclick="openAd()">
                            <div class="icon-circle"><i class="fas fa-share"></i></div>
                            <span class="action-label">نشر</span>
                        </div>
                        <div class="action-btn" onclick="openAd()">
                            <div class="icon-circle"><i class="fas fa-bolt"></i></div>
                            <span class="action-label">VIP</span>
                        </div>
                    </div>
                    <div class="ui-overlay">
                        <div class="user-tag">@${vid.sender}</div>
                        <div class="video-desc">نظام التشغيل SHΔDØW V99 - تم تعطيل التعليقات بنجاح.</div>
                    </div>
                `;
                container.appendChild(section);
            });
            initObserver();
        });

        function togglePlay(v) {
            if (v.paused) { v.play(); } else { v.pause(); }
        }

        function toggleLike(id) {
            openAd();
            db.ref(`videos/${id}`).transaction(p => { 
                if(p) p.likes = (p.likes || 0) + 1; 
                return p; 
            });
        }

        function initObserver() {
            const options = { threshold: 0.7 };
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    const video = entry.target.querySelector('video');
                    if (entry.isIntersecting) {
                        video.play().catch(e => console.log("Autoplay blocked"));
                    } else {
                        video.pause();
                        video.currentTime = 0;
                    }
                });
            }, options);
            document.querySelectorAll('.video-scroll-item').forEach(item => observer.observe(item));
        }

        // منع التمرير الارتدادي في iOS
        document.addEventListener('touchmove', function (e) {
            if (e.target.closest('.video-container')) return;
            e.preventDefault();
        }, { passive: false });
    </script>
</body>
</html>
