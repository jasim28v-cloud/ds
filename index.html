<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SHΔDØW | ORANGE TITAN</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://upload-widget.cloudinary.com/global/all.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Cairo:wght@300;900&display=swap');
        :root { --primary: #ff6600; --bg: #000; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { background: var(--bg); color: #fff; font-family: 'Cairo', sans-serif; margin: 0; padding: 0; height: 100vh; overflow: hidden; width: 100vw; position: fixed; }

        .video-container { height: 100vh; width: 100vw; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; position: relative; z-index: 1; }
        .video-container::-webkit-scrollbar { display: none; }
        .video-scroll-item { height: 100vh; width: 100vw; scroll-snap-align: start; position: relative; background: #000; display: flex; align-items: center; justify-content: center; }
        video { width: 100%; height: 100%; object-fit: cover; }

        .top-interface { 
            position: fixed; top: 0; width: 100%; z-index: 100; 
            background: rgba(0, 0, 0, 0.3); backdrop-filter: blur(10px); 
            border-bottom: 1px solid rgba(255, 102, 0, 0.3);
        }
        .header-content { padding: 12px 15px; display: flex; justify-content: space-between; align-items: center; }
        .logo-area { display: flex; align-items: center; gap: 15px; }
        .logo { font-family: 'Orbitron'; font-weight: 900; color: var(--primary); font-size: 1.3rem; text-shadow: 0 0 15px rgba(255,102,0,0.6); }
        .digital-clock { font-family: 'Orbitron', sans-serif; font-size: 12px; color: rgba(255,255,255,0.7); }

        .progress-container { width: 100%; height: 3px; background: rgba(255,255,255,0.1); position: relative; }
        #video-progress-bar { height: 100%; width: 0%; background: var(--primary); box-shadow: 0 0 10px var(--primary); transition: width 0.1s linear; }

        .side-actions { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; gap: 20px; z-index: 20; align-items: center; }
        .icon-circle { width: 50px; height: 50px; background: rgba(0,0,0,0.5); backdrop-filter: blur(10px); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; border: 1px solid rgba(255,102,0,0.4); color: white; transition: 0.3s; }
        .icon-circle.active-orange { color: var(--primary); border-color: var(--primary); box-shadow: 0 0 15px var(--primary); }

        .video-info { position: absolute; bottom: 80px; right: 15px; text-align: right; z-index: 20; }
        .hashtag { color: var(--primary); font-weight: 900; font-size: 14px; text-shadow: 0 0 5px rgba(0,0,0,0.5); }

        .bottom-bar { position: fixed; bottom: 0; width: 100%; height: 65px; background: rgba(0,0,0,0.7); backdrop-filter: blur(20px); display: flex; justify-content: space-around; align-items: center; z-index: 100; border-top: 1px solid rgba(255,102,0,0.3); }
        .nav-icon { font-size: 22px; color: rgba(255,255,255,0.6); }
        .nav-icon.active { color: var(--primary); text-shadow: 0 0 10px var(--primary); }
        .upload-btn { background: var(--primary); color: #fff; width: 50px; height: 32px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 20px; box-shadow: 0 0 15px rgba(255,102,0,0.4); }

        #admin-panel { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 9999; padding: 20px; overflow-y: auto; }
        .admin-card { background: rgba(255,255,255,0.05); border-radius: 12px; border: 1px solid var(--primary); overflow: hidden; }

        .heart-pop { position: absolute; font-size: 80px; color: var(--primary); pointer-events: none; z-index: 1000; animation: heartFade 0.8s ease-out forwards; }
        @keyframes heartFade { 0% { opacity:0; transform: scale(0.5); } 50% { opacity:1; } 100% { opacity:0; transform: scale(1.8); } }
    </style>
</head>
<body>

    <div class="top-interface">
        <div class="header-content">
            <div class="logo-area">
                <div class="logo">SHΔDØW</div>
                <div class="digital-clock" id="clock">00:00:00</div>
            </div>
            <div class="text-[10px] text-orange-400 font-bold" id="user-id">---</div>
        </div>
        <div class="progress-container">
            <div id="video-progress-bar"></div>
        </div>
    </div>

    <div id="admin-panel">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-xl font-black text-orange-500 uppercase">Orange Control</h2>
            <i class="fas fa-times text-2xl cursor-pointer" onclick="toggleAdmin()"></i>
        </div>
        <div id="admin-list" class="grid grid-cols-2 gap-3 pb-10"></div>
    </div>

    <div class="video-container" id="feed"></div>

    <div class="bottom-bar">
        <i class="fas fa-home nav-icon active" onclick="location.reload()"></i>
        <i class="fas fa-search nav-icon" onclick="alert('قريباً...')"></i>
        <div class="upload-btn" id="up-trigger"><i class="fas fa-plus"></i></div>
        <i class="fas fa-share-alt nav-icon" onclick="realShare()"></i>
        <i class="fas fa-user-shield nav-icon" onclick="toggleAdmin()"></i>
    </div>

    <script>
        const MY_ID = localStorage.getItem('shadow_uid') || 'GHOST_' + Math.random().toString(36).substr(2, 4).toUpperCase();
        localStorage.setItem('shadow_uid', MY_ID);
        document.getElementById('user-id').innerText = MY_ID;

        const firebaseConfig = { databaseURL: "https://project-717e4-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function realShare() {
            if (navigator.share) {
                navigator.share({ title: 'SHΔDØW ORANGE', text: 'شاهد هذا المحتوى الرهيب!', url: window.location.href });
            } else {
                alert("رابط الموقع: " + window.location.href);
            }
        }

        const widget = cloudinary.createUploadWidget({ 
            cloudName: "dssk5tabb", 
            uploadPreset: "bjebvo5p",
            styles: { palette: { window: "#000", sourceBg: "#000", windowBorder: "#ff6600", tabIcon: "#ff6600", inactiveTabIcon: "#555", menuIcons: "#ff6600", link: "#ff6600", action: "#ff6600", inProgress: "#ff6600", textLight: "#fff" } }
        }, (err, res) => {
            if (!err && res.event === "success") {
                db.ref('videos/').push({ url: res.info.secure_url, sender: MY_ID, likes: 0, time: Date.now() });
            }
        });
        document.getElementById("up-trigger").onclick = () => widget.open();

        db.ref('videos').on('value', (snap) => {
            const feed = document.getElementById('feed');
            const adminList = document.getElementById('admin-list');
            const data = snap.val();
            if(!data) return;
            feed.innerHTML = '';
            adminList.innerHTML = '';

            Object.keys(data).reverse().forEach(id => {
                const v = data[id];
                const section = document.createElement('div');
                section.className = 'video-scroll-item';
                section.innerHTML = `
                    <video loop playsinline src="${v.url}" ontimeupdate="updateProgress(this)" onclick="handleVideo(event, '${id}')"></video>
                    
                    <div class="side-actions">
                        <div class="action-btn text-center" onclick="like('${id}')">
                            <div class="icon-circle"><i class="fas fa-heart"></i></div>
                            <span class="text-[10px] font-bold mt-1 text-orange-400">${v.likes || 0}</span>
                        </div>
                        <div class="icon-circle" onclick="toggleMute(event, '${id}')" id="mute-${id}">
                            <i class="fas fa-volume-up"></i>
                        </div>
                        <div class="icon-circle" onclick="realShare()"><i class="fas fa-paper-plane"></i></div>
                    </div>

                    <div class="video-info">
                        <div class="hashtag">#SHADOW_ORANGE #PRO_VIDEO</div>
                        <div class="text-[10px] text-white/70 mt-1">بواسطة: ${v.sender}</div>
                    </div>
                `;
                feed.appendChild(section);

                const card = document.createElement('div');
                card.className = 'admin-card p-2';
                card.innerHTML = `
                    <video src="${v.url}" class="h-24 w-full object-cover rounded mb-2" muted></video>
                    <button onclick="del('${id}')" class="w-full bg-orange-600 text-[10px] py-2 rounded font-black">حذف</button>
                `;
                adminList.appendChild(card);
            });
            initObs();
        });

        function updateProgress(video) {
            const rect = video.parentElement.getBoundingClientRect();
            if (Math.abs(rect.top) < 10) {
                const bar = document.getElementById('video-progress-bar');
                document.getElementById('video-progress-bar').style.width = (video.currentTime / video.duration) * 100 + "%";
            }
        }

        function toggleMute(e, id) {
            e.stopPropagation();
            const video = e.target.closest('.video-scroll-item').querySelector('video');
            const icon = e.currentTarget.querySelector('i');
            video.muted = !video.muted;
            icon.className = video.muted ? 'fas fa-volume-mute' : 'fas fa-volume-up';
            e.currentTarget.classList.toggle('active-orange', !video.muted);
        }

        let lastT = 0;
        function handleVideo(e, id) {
            const now = Date.now();
            if(now - lastT < 300) {
                like(id);
                const h = document.createElement('i'); h.className = 'fas fa-heart heart-pop';
                h.style.left = e.clientX + 'px'; h.style.top = e.clientY + 'px';
                document.body.appendChild(h); setTimeout(() => h.remove(), 800);
            } else { e.target.paused ? e.target.play() : e.target.pause(); }
            lastT = now;
        }

        function like(id) { db.ref(`videos/${id}/likes`).transaction(l => (l || 0) + 1); }
        function del(id) { if(confirm('حذف؟')) db.ref(`videos/${id}`).remove(); }
        function toggleAdmin() {
            const p = document.getElementById('admin-panel');
            p.style.display = (p.style.display === 'none' || p.style.display === '') ? 'block' : 'none';
        }

        function initObs() {
            const obs = new IntersectionObserver((es) => {
                es.forEach(e => {
                    const v = e.target.querySelector('video');
                    if(e.isIntersecting) { v.play().catch(()=>{}); } else { v.pause(); v.currentTime = 0; }
                });
            }, { threshold: 0.7 });
            document.querySelectorAll('.video-scroll-item').forEach(i => obs.observe(i));
        }

        function updateClock() {
            const now = new Date();
            document.getElementById('clock').textContent = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0') + ":" + now.getSeconds().toString().padStart(2, '0');
        }
        setInterval(updateClock, 1000);
        updateClock();
    </script>
</body>
</html>
