<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VØID-X | ULTRA IONIC GENERATION</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://upload-widget.cloudinary.com/global/all.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Tajawal:wght@300;700&display=swap');

        :root {
            --ion-core: #00f3ff;
            --ion-glow: rgba(0, 243, 255, 0.5);
            --ultra-dark: #020205;
        }

        body {
            margin: 0; background: var(--ultra-dark);
            color: white; font-family: 'Tajawal', sans-serif;
            overflow: hidden;
        }

        #ion-canvas { position: fixed; top: 0; left: 0; z-index: -1; filter: blur(2px); }

        .ultra-glass {
            background: rgba(255, 255, 255, 0.015);
            backdrop-filter: blur(40px) saturate(200%);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
        }

        .ionic-node {
            position: relative;
            transition: 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .ionic-node:hover {
            transform: translateY(-10px) scale(1.02);
            border-color: var(--ion-core);
            box-shadow: 0 0 30px var(--ion-glow);
        }

        .video-stream {
            height: 100vh;
            scroll-snap-type: y mandatory;
            overflow-y: scroll;
            scrollbar-width: none;
        }
        .video-stream::-webkit-scrollbar { display: none; }

        .stream-unit {
            height: 100vh;
            scroll-snap-align: start;
            display: flex;
            align-items: center;
            justify-content: center;
            perspective: 1000px;
        }

        .floating-actions {
            position: absolute;
            right: 40px;
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        .ion-sphere {
            width: 65px; height: 65px;
            border-radius: 20px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.1);
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
            transition: 0.4s;
            backdrop-filter: blur(10px);
        }

        .ion-sphere:hover {
            background: var(--ion-core);
            color: black;
            border-radius: 50%;
            transform: rotate(90deg);
        }

        .uploader-btn {
            background: linear-gradient(90deg, #00f3ff, #7a00ff);
            padding: 1px;
            border-radius: 15px;
            cursor: pointer;
        }

        .uploader-inner {
            background: var(--ultra-dark);
            padding: 12px 30px;
            border-radius: 14px;
            font-family: 'Syncopate', sans-serif;
            font-weight: 700;
            letter-spacing: 2px;
            transition: 0.3s;
        }

        .uploader-btn:hover .uploader-inner { background: transparent; color: white; }
    </style>
</head>
<body>

    <canvas id="ion-canvas"></canvas>

    <nav class="fixed top-0 w-full z-50 p-10 flex justify-between items-center">
        <div class="text-3xl font-bold tracking-tighter" style="font-family: 'Syncopate';">
            VØID<span class="text-[var(--ion-core)]">.ULTRA</span>
        </div>
        
        <div class="uploader-btn" id="ionUpload">
            <div class="uploader-inner">IONIC_UPLOAD</div>
        </div>
    </nav>

    <div class="video-stream" id="ionFeed">
        </div>

    <div class="fixed bottom-10 left-10 z-50">
        <div class="ultra-glass p-5 rounded-3xl flex items-center gap-4 ionic-node cursor-pointer" onclick="toggleIonChat()">
            <div class="w-3 h-3 bg-[var(--ion-core)] rounded-full animate-ping"></div>
            <span class="text-sm font-bold tracking-widest">IONIC_CHAT_SYSTEM</span>
        </div>
    </div>

    <script>
        // --- محرك الأيونات الخلفي (Three.js Advanced Particles) ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({canvas: document.getElementById('ion-canvas'), antialias: true, alpha: true});
        renderer.setSize(window.innerWidth, window.innerHeight);

        const geometry = new THREE.TorusGeometry(10, 3, 16, 100);
        const material = new THREE.PointsMaterial({size: 0.05, color: 0x00f3ff});
        const particles = new THREE.Points(geometry, material);
        scene.add(particles);
        camera.position.z = 15;

        function animateIon() {
            requestAnimationFrame(animateIon);
            particles.rotation.y += 0.002;
            particles.rotation.x += 0.001;
            renderer.render(scene, camera);
        }
        animateIon();

        // --- نظام الرفع والأتمتة ---
        const FB_DB = "https://forg-c693e-default-rtdb.firebaseio.com/ultra_ions.json";
        const ADS = [
            "https://www.effectivegatecpm.com/bxwxuk2f39?key=566216691dc8b76a740840e94f68f44c",
            "https://www.effectivegatecpm.com/k60w64w4gk?key=564f3d8cc4ac85949f218179b742495e"
        ];

        const widget = cloudinary.createUploadWidget({
            cloudName: 'dfscughol',
            uploadPreset: 'update_vk',
            theme: 'minimal'
        }, (err, res) => {
            if (!err && res.event === "success") {
                fetch(FB_DB, { method: 'POST', body: JSON.stringify({url: res.info.secure_url, date: Date.now()}) })
                .then(() => location.reload());
            }
        });

        document.getElementById('ionUpload').onclick = () => widget.open();

        // --- بناء الخلاصة الأيونية ---
        async function buildIonFeed() {
            const res = await fetch(FB_DB);
            const data = await res.json();
            const feed = document.getElementById('ionFeed');
            
            for(let id in data) {
                feed.innerHTML += `
                    <div class="stream-unit">
                        <div class="w-[380px] h-[680px] ultra-glass rounded-[50px] relative ionic-node overflow-hidden">
                            <video src="${data[id].url}" class="w-full h-full object-cover" loop playsinline></video>
                            
                            <div class="floating-actions">
                                <div class="ion-sphere" onclick="window.open('${ADS[0]}')">⚡</div>
                                <div class="ion-sphere" onclick="window.open('${ADS[1]}')">💠</div>
                                <div class="ion-sphere" onclick="window.open('${ADS[0]}')">🔗</div>
                            </div>

                            <div class="absolute bottom-10 right-10 left-10">
                                <div class="h-[2px] w-full bg-white/10 mb-4"><div class="h-full bg-[var(--ion-core)] w-1/3"></div></div>
                                <p class="text-[10px] opacity-50 uppercase tracking-widest">Core Entity: ${id.slice(-5)}</p>
                            </div>
                        </div>
                    </div>
                `;
            }

            // نظام التشغيل الذكي
            const observer = new IntersectionObserver(entries => {
                entries.forEach(entry => {
                    const v = entry.target.querySelector('video');
                    if (v) entry.isIntersecting ? v.play() : v.pause();
                });
            }, { threshold: 0.7 });
            document.querySelectorAll('.stream-unit').forEach(unit => observer.observe(unit));
        }

        buildIonFeed();
    </script>
</body>
</html>
