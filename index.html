<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SHΔDØW | YELLOW TITAN ADMIN</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://upload-widget.cloudinary.com/global/all.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Cairo:wght@300;900&display=swap');
        :root { --primary: #ffcc00; --bg: #050505; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { background: var(--bg); color: #fff; font-family: 'Cairo', sans-serif; margin: 0; padding: 0; height: 100vh; overflow: hidden; width: 100vw; position: fixed; }

        .video-container { height: 100vh; width: 100vw; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; position: relative; z-index: 1; }
        .video-container::-webkit-scrollbar { display: none; }
        .video-scroll-item { height: 100vh; width: 100vw; scroll-snap-align: start; position: relative; background: #000; display: flex; align-items: center; justify-content: center; }
        video { width: 100%; height: 100%; object-fit: cover; }

        .top-interface { position: fixed; top: 0; width: 100%; padding: 10px 15px; z-index: 100; background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent); }
        .logo { font-family: 'Orbitron'; font-weight: 900; color: var(--primary); font-size: 1.3rem; }

        /* نافذة الدردشة المنبثقة */
        #chat-modal { display: none; position: fixed; top: 80px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 400px; height: 300px; background: rgba(10,10,10,0.95); backdrop-filter: blur(20px); z-index: 1000; border: 1px solid var(--primary); border-radius: 20px; padding: 15px; }
        .chat-flow { height: 220px; overflow-y: auto; font-size: 12px; margin-bottom: 10px; }
        .chat-entry { margin-bottom: 5px; border-right: 2px solid var(--primary); padding-right: 8px; }

        /* لوحة التحكم (للمسؤول فقط) */
        #admin-panel { display: none; position: fixed; inset: 0; background: #000; z-index: 2000; overflow-y: auto; padding: 20px; }

        .bottom-bar { position: fixed; bottom: 0; width: 100%; height: 65px; background: rgba(0,0,0,0.95); display: flex; justify-content: space-around; align-items: center; z-index: 100; border-top: 1px solid rgba(255, 204, 0, 0.2); }
        .nav-icon { font-size: 22px; color: rgba(255,255,255,0.6); cursor: pointer; position: relative; }
        .nav-icon.active { color: var(--primary); }
        .upload-btn { background: var(--primary); color: #000; width: 45px; height: 32px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 20px; }

        .side-actions { position: absolute; right: 15px; bottom: 160px; display: flex; flex-direction: column; gap: 20px; z-index: 20; }
        .icon-circle { width: 50px; height: 50px; background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; border: 1px solid rgba(255,204,0,0.3); }
        
        .admin-delete-btn { background: #ff0055; color: white; padding: 5px 10px; border-radius: 5px; font-size: 10px; margin-top: 10px; pointer-events: auto; }
    </style>
</head>
<body>

    <div class="top-interface">
        <div class="flex justify-between items-center">
            <div class="logo">SHΔDØW</div>
            <div class="text-[10px] text-yellow-500" id="user-id">---</div>
        </div>
    </div>

    <div id="chat-modal">
        <div class="flex justify-between mb-2">
            <span class="text-xs font-bold text-yellow-500">الدردشة العالمية</span>
            <i class="fas fa-times" onclick="toggleChat()"></i>
        </div>
        <div class="chat-flow" id="chat-content"></div>
        <div class="flex gap-2">
            <input type="text" id="chat-input" class="flex-1 bg-white/10 rounded-full px-4 text-xs h-8" placeholder="اكتب رسالة...">
            <button onclick="sendChat()" class="bg-yellow-500 text-black px-3 rounded-full text-xs">إرسال</button>
        </div>
    </div>

    <div id="admin-panel">
        <div class="flex justify-between items-center mb-8">
            <h2 class="text-xl font-bold text-yellow-500">لوحة التحكم</h2>
            <button onclick="toggleAdmin()" class="text-white text-sm">إغلاق</button>
        </div>
        <div id="admin-list" class="grid grid-cols-2 gap-4"></div>
    </div>

    <div class="video-container" id="feed-container"></div>

    <div class="bottom-bar">
        <i class="fas fa-home nav-icon active" onclick="location.reload()"></i>
        <i class="fas fa-comment-dots nav-icon" onclick="toggleChat()" id="chat-trigger"></i>
        <div class="upload-btn" id="mega-upload"><i class="fas fa-plus"></i></div>
        <i class="fas fa-search nav-icon" onclick="openAd()"></i>
        <i class="fas fa-user-shield nav-icon" onclick="toggleAdmin()" id="admin-icon"></i>
    </div>

    <script>
        // إعداد الهوية (ID الخاص بك)
        const ADMIN_ID = "GHOST_5NN5M5"; // قم بتغيير هذا ليكون الـ ID الخاص بك دائماً
        const MY_ID = localStorage.getItem('shadow_uid') || 'USER_' + Math.random().toString(36).substr(2, 4).toUpperCase();
        localStorage.setItem('shadow_uid', MY_ID);
        document.getElementById('user-id').innerText = `ID: ${MY_ID}`;

        const firebaseConfig = { databaseURL: "https://project-717e4-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const AD_LINKS = ["https://www.effectivegatecpm.com/k60w64w4gk?key=564f3d8cc4ac85949f218179b742495e", "https://www.effectivegatecpm.com/bxwxuk2f39?key=566216691dc8b76a740840e94f68f44c"];
        function openAd() { window.open(AD_LINKS[Math.floor(Math.random()*AD_LINKS.length)], '_blank'); }

        const widget = cloudinary.createUploadWidget({ cloudName: "dssk5tabb", uploadPreset: "bjebvo5p" }, (err, res) => {
            if (!err && res.event === "success") {
                db.ref('videos/').push({ url: res.info.secure_url, sender: MY_ID, likes: 0, timestamp: Date.now() });
                openAd();
            }
        });
        document.getElementById("mega-upload").onclick = () => widget.open();

        db.ref('videos').on('value', (snapshot) => {
            const container = document.getElementById('feed-container');
            const adminList = document.getElementById('admin-list');
            const data = snapshot.val();
            if(!data) return;
            container.innerHTML = '';
            adminList.innerHTML = '';
            Object.keys(data).reverse().forEach(id => {
                const vid = data[id];
                const section = document.createElement('div');
                section.className = 'video-scroll-item';
                section.innerHTML = `
                    <video loop playsinline src="${vid.url}" onclick="this.paused ? this.play() : this.pause()"></video>
                    <div class="side-actions">
                        <div class="action-btn" onclick="db.ref('videos/${id}/likes').transaction(l=>(l||0)+1)">
                            <div class="icon-circle"><i class="fas fa-heart"></i></div>
                            <span class="action-label text-center text-[10px]">${vid.likes || 0}</span>
                        </div>
                    </div>
                `;
                container.appendChild(section);

                // إضافة للوحة الإدارة
                const adminItem = document.createElement('div');
                adminItem.className = 'bg-white/5 p-2 rounded';
                adminItem.innerHTML = `<video src="${vid.url}" class="h-20 w-full object-cover mb-2"></video><button onclick="deleteVideo('${id}')" class="w-full bg-red-600 text-[10px] py-1">حذف</button>`;
                adminList.appendChild(adminItem);
            });
            startObserver();
        });

        function deleteVideo(id) { if(confirm('حذف الفيديو نهائياً؟')) db.ref(`videos/${id}`).remove(); }
        function toggleChat() { const m = document.getElementById('chat-modal'); m.style.display = m.style.display === 'block' ? 'none' : 'block'; }
        function toggleAdmin() { 
            if(MY_ID === ADMIN_ID || MY_ID.includes("GHOST")) {
                const p = document.getElementById('admin-panel'); 
                p.style.display = p.style.display === 'block' ? 'none' : 'block'; 
            } else { alert("عذراً، هذا القسم للمسؤول فقط."); }
        }

        function sendChat() {
            const input = document.getElementById('chat-input');
            if(input.value) { db.ref('global_chat').push({ user: MY_ID, text: input.value }); input.value = ''; }
        }

        db.ref('global_chat').limitToLast(20).on('value', s => {
            const flow = document.getElementById('chat-content');
            flow.innerHTML = '';
            s.forEach(child => {
                const m = child.val();
                flow.innerHTML += `<div class="chat-entry"><b class="text-yellow-500">${m.user}:</b> ${m.text}</div>`;
            });
            flow.scrollTop = flow.scrollHeight;
        });

        function startObserver() {
            const obs = new IntersectionObserver((entries) => {
                entries.forEach(e => { const v = e.target.querySelector('video'); if (e.isIntersecting) v.play(); else { v.pause(); v.currentTime = 0; } });
            }, { threshold: 0.8 });
            document.querySelectorAll('.video-scroll-item').forEach(i => obs.observe(i));
        }
    </script>
</body>
</html>
