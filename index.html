<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SHΔDØW | ULTIMATE TITAN</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://upload-widget.cloudinary.com/global/all.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Cairo:wght@300;900&display=swap');
        :root { --primary: #ffcc00; --bg: #000; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { background: var(--bg); color: #fff; font-family: 'Cairo', sans-serif; margin: 0; padding: 0; height: 100vh; overflow: hidden; width: 100vw; }

        .video-container { height: 100vh; width: 100vw; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; position: relative; }
        .video-container::-webkit-scrollbar { display: none; }
        .video-scroll-item { height: 100vh; width: 100vw; scroll-snap-align: start; position: relative; background: #000; display: flex; align-items: center; justify-content: center; }
        video { width: 100%; height: 100%; object-fit: cover; }

        /* العلامة المائية */
        .watermark { position: absolute; top: 15%; left: 10px; opacity: 0.5; pointer-events: none; z-index: 50; font-family: 'Orbitron'; font-size: 14px; color: rgba(255,255,255,0.4); text-shadow: 1px 1px 2px #000; }

        /* واجهة شفافة */
        .ui-overlay { position: absolute; bottom: 100px; left: 0; right: 0; padding: 20px; background: linear-gradient(to top, rgba(0,0,0,0.6), transparent); pointer-events: none; z-index: 10; }

        .side-actions { position: absolute; right: 15px; bottom: 150px; display: flex; flex-direction: column; gap: 20px; z-index: 20; align-items: center; }
        .icon-circle { width: 54px; height: 54px; background: rgba(0, 0, 0, 0.3); backdrop-filter: blur(5px); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 26px; border: 1px solid rgba(255,204,0,0.2); transition: 0.2s; }
        .icon-circle:active { transform: scale(0.9); border-color: var(--primary); }

        .top-interface { position: fixed; top: 0; width: 100%; padding: 10px; z-index: 100; background: linear-gradient(to bottom, rgba(0,0,0,0.5), transparent); }
        .logo { font-family: 'Orbitron'; font-weight: 900; color: var(--primary); font-size: 1.4rem; }

        #chat-modal { display: none; position: fixed; top: 80px; left: 50%; transform: translateX(-50%); width: 85%; height: 250px; background: rgba(0,0,0,0.8); backdrop-filter: blur(15px); z-index: 1000; border: 1px solid var(--primary); border-radius: 15px; padding: 10px; }
        .chat-flow { height: 180px; overflow-y: auto; font-size: 11px; }

        .bottom-bar { position: fixed; bottom: 0; width: 100%; height: 60px; background: rgba(0,0,0,0.4); backdrop-filter: blur(10px); display: flex; justify-content: space-around; align-items: center; z-index: 100; border-top: 1px solid rgba(255,255,255,0.05); }
        .nav-icon { font-size: 20px; color: rgba(255,255,255,0.7); }
        .upload-btn { background: var(--primary); color: #000; width: 45px; height: 30px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 18px; }

        /* تأثير القلب عند النقر المزدوج */
        .heart-animation { position: absolute; color: var(--primary); font-size: 80px; opacity: 0; pointer-events: none; z-index: 100; transform: translate(-50%, -50%) scale(0); animation: heartBeat 0.8s ease-out; }
        @keyframes heartBeat { 0% { opacity: 0; transform: translate(-50%, -50%) scale(0); } 30% { opacity: 0.9; transform: translate(-50%, -50%) scale(1.2); } 100% { opacity: 0; transform: translate(-50%, -50%) scale(1.5); } }
    </style>
</head>
<body>

    <div class="top-interface flex justify-between items-center">
        <div class="logo">SHΔDØW</div>
        <div class="text-[10px] opacity-60" id="user-id">---</div>
    </div>

    <div id="chat-modal">
        <div class="chat-flow" id="chat-content"></div>
        <div class="flex gap-2 mt-2">
            <input type="text" id="chat-input" class="flex-1 bg-white/10 rounded-full px-4 text-[11px]" placeholder="اكتب هنا...">
            <button onclick="sendChat()" class="text-yellow-500"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>

    <div class="video-container" id="feed-container"></div>

    <div class="bottom-bar">
        <i class="fas fa-home nav-icon" onclick="location.reload()"></i>
        <i class="fas fa-comment nav-icon" onclick="toggleChat()"></i>
        <div class="upload-btn" id="mega-upload"><i class="fas fa-plus"></i></div>
        <i class="fas fa-search nav-icon" onclick="openAd()"></i>
        <i class="fas fa-user-shield nav-icon" onclick="toggleAdmin()"></i>
    </div>

    <script>
        const ADMIN_ID = "GHOST_5NN5M5";
        const MY_ID = localStorage.getItem('shadow_uid') || 'GHOST_' + Math.random().toString(36).substr(2, 4).toUpperCase();
        localStorage.setItem('shadow_uid', MY_ID);
        document.getElementById('user-id').innerText = MY_ID;

        const firebaseConfig = { databaseURL: "https://project-717e4-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const AD_LINKS = ["https://www.effectivegatecpm.com/k60w64w4gk?key=564f3d8cc4ac85949f218179b742495e", "https://www.effectivegatecpm.com/bxwxuk2f39?key=566216691dc8b76a740840e94f68f44c"];
        function openAd() { window.open(AD_LINKS[Math.floor(Math.random()*2)], '_blank'); }

        const widget = cloudinary.createUploadWidget({ cloudName: "dssk5tabb", uploadPreset: "bjebvo5p" }, (err, res) => {
            if (!err && res.event === "success") {
                db.ref('videos/').push({ url: res.info.secure_url, sender: MY_ID, likes: 0 });
                openAd();
            }
        });
        document.getElementById("mega-upload").onclick = () => widget.open();

        db.ref('videos').on('value', (snapshot) => {
            const container = document.getElementById('feed-container');
            const data = snapshot.val();
            if(!data) return;
            container.innerHTML = '';
            Object.keys(data).reverse().forEach(id => {
                const vid = data[id];
                const section = document.createElement('div');
                section.className = 'video-scroll-item';
                section.innerHTML = `
                    <div class="watermark">SHΔDØW TITAN</div>
                    <video loop playsinline src="${vid.url}" id="v-${id}" onclick="handleVideoClick(event, '${id}')"></video>
                    <div class="side-actions">
                        <div class="action-btn" onclick="likeVideo('${id}')">
                            <div class="icon-circle"><i class="fas fa-heart text-white"></i></div>
                            <span class="text-[10px] mt-1">${vid.likes || 0}</span>
                        </div>
                        <div class="action-btn" onclick="openAd()">
                            <div class="icon-circle"><i class="fas fa-share text-white"></i></div>
                            <span class="text-[10px] mt-1 text-center">SHΔRE</span>
                        </div>
                    </div>
                    <div class="ui-overlay">
                        <div class="text-yellow-500 font-bold text-sm">@${vid.sender}</div>
                        <div class="text-[11px] opacity-80">نظام تيتان المطور - وضع المشاهدة السري</div>
                    </div>
                `;
                container.appendChild(section);
            });
            startObserver();
        });

        let lastTap = 0;
        function handleVideoClick(e, id) {
            const now = Date.now();
            if (now - lastTap < 300) {
                // النقر المزدوج
                likeVideo(id);
                showHeartAnimation(e);
            } else {
                const v = e.target;
                v.paused ? v.play() : v.pause();
            }
            lastTap = now;
        }

        function showHeartAnimation(e) {
            const heart = document.createElement('i');
            heart.className = 'fas fa-heart heart-animation';
            heart.style.left = e.clientX + 'px';
            heart.style.top = e.clientY + 'px';
            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), 800);
        }

        function likeVideo(id) { openAd(); db.ref(`videos/${id}/likes`).transaction(l => (l || 0) + 1); }
        function toggleChat() { const m = document.getElementById('chat-modal'); m.style.display = m.style.display === 'block' ? 'none' : 'block'; }
        function toggleAdmin() { alert("جاري التحقق من صلاحيات المسؤول..."); if(MY_ID.includes("GHOST")) { /* لوحة التحكم */ } }

        function sendChat() {
            const input = document.getElementById('chat-input');
            if(input.value) { db.ref('global_chat').push({ user: MY_ID, text: input.value }); input.value = ''; }
        }

        db.ref('global_chat').limitToLast(15).on('value', s => {
            const flow = document.getElementById('chat-content');
            flow.innerHTML = '';
            s.forEach(child => {
                const m = child.val();
                flow.innerHTML += `<div class="mb-1 text-[10px]"><b class="text-yellow-500">${m.user}:</b> ${m.text}</div>`;
            });
            flow.scrollTop = flow.scrollHeight;
        });

        function startObserver() {
            const obs = new IntersectionObserver((entries) => {
                entries.forEach(e => { 
                    const v = e.target.querySelector('video'); 
                    if (e.isIntersecting) v.play().catch(()=>{}); 
                    else { v.pause(); v.currentTime = 0; } 
                });
            }, { threshold: 0.8 });
            document.querySelectorAll('.video-scroll-item').forEach(i => obs.observe(i));
        }
    </script>
</body>
</html>
