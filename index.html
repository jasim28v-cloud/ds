<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DarkChat AI | محادثة مظلمة بدون قيود</title>
    <!-- Font Awesome للأيقونات -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"/>
    <!-- Animate.css للتأثيرات الحركية -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        :root {
            --dark-bg: #0a0a0a;
            --darker-bg: #000000;
            --light-text: #e0e0e0;
            --primary-color: #ff00aa;
            --secondary-color: #aa00ff;
            --glass-bg: rgba(20, 20, 20, 0.6);
            --glass-border: rgba(255, 255, 255, 0.1);
            --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            --transition-speed: 0.3s;
            --warning-color: #ff6b6b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--dark-bg);
            color: var(--light-text);
            height: 100vh;
            overflow: hidden;
            user-select: none;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200"><defs><radialGradient id="a" cx="0.5" cy="0.5" r="0.5" gradientUnits="objectBoundingBox"><stop offset="0%" stop-color="%23ff00aa" stop-opacity="0.1"/><stop offset="100%" stop-color="%23aa00ff" stop-opacity="0"/></radialGradient></defs><circle cx="100" cy="100" r="80" fill="url(%23a)"/></svg>');
        }

        .app-container {
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .chat-header {
            width: 100%;
            max-width: 800px;
            margin-bottom: 20px;
            text-align: center;
        }

        .chat-header h1 {
            font-size: 36px;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 10px;
            text-shadow: 0 0 15px rgba(255, 0, 170, 0.3);
        }

        .chat-header p {
            font-size: 16px;
            opacity: 0.8;
            color: var(--warning-color);
        }

        .chat-container {
            width: 100%;
            max-width: 800px;
            height: 70vh;
            background: var(--glass-bg);
            border-radius: 20px;
            border: 1px solid var(--glass-border);
            box-shadow: var(--glass-shadow);
            backdrop-filter: blur(10px);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        .chat-messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .chat-messages::-webkit-scrollbar {
            width: 8px;
        }

        .chat-messages::-webkit-scrollbar-thumb {
            background: var(--primary-color);
            border-radius: 10px;
        }

        .message {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 15px;
            word-wrap: break-word;
            position: relative;
            animation: fadeIn 0.3s ease;
        }

        .user-message {
            align-self: flex-end;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: var(--dark-bg);
            border-bottom-right-radius: 0;
        }

        .ai-message {
            align-self: flex-start;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            color: var(--light-text);
            border-bottom-left-radius: 0;
        }

        .message-time {
            font-size: 10px;
            opacity: 0.7;
            margin-top: 5px;
            text-align: right;
        }

        .chat-input-container {
            display: flex;
            padding: 15px;
            background: rgba(0, 0, 0, 0.3);
            border-top: 1px solid var(--glass-border);
        }

        .chat-input {
            flex: 1;
            padding: 12px 15px;
            border-radius: 20px;
            border: 1px solid var(--glass-border);
            background: rgba(255, 255, 255, 0.1);
            color: var(--light-text);
            font-size: 16px;
            outline: none;
        }

        .chat-input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        .send-button {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: var(--primary-color);
            border: none;
            color: white;
            font-size: 20px;
            margin-left: 10px;
            cursor: pointer;
            transition: all var(--transition-speed) ease;
        }

        .send-button:hover {
            transform: scale(1.1);
            background: var(--secondary-color);
        }

        .typing-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 15px;
            background: var(--glass-bg);
            border-radius: 15px;
            border: 1px solid var(--glass-border);
            max-width: 80%;
            align-self: flex-start;
            display: none;
        }

        .typing-dot {
            width: 8px;
            height: 8px;
            background: var(--primary-color);
            border-radius: 50%;
            animation: typingAnimation 1.5s infinite ease-in-out;
        }

        .typing-dot:nth-child(1) {
            animation-delay: 0s;
        }

        .typing-dot:nth-child(2) {
            animation-delay: 0.3s;
        }

        .typing-dot:nth-child(3) {
            animation-delay: 0.6s;
        }

        @keyframes typingAnimation {
            0%, 60%, 100% {
                transform: translateY(0);
            }
            30% {
                transform: translateY(-5px);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .chat-settings {
            position: absolute;
            top: 15px;
            right: 15px;
            display: flex;
            gap: 10px;
        }

        .setting-button {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            color: var(--light-text);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all var(--transition-speed) ease;
        }

        .setting-button:hover {
            background: rgba(255, 0, 170, 0.2);
            transform: scale(1.1);
        }

        .disclaimer {
            position: fixed;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 10px;
            color: var(--warning-color);
            text-align: center;
            width: 90%;
            opacity: 0.7;
        }

        @media (max-width: 768px) {
            .chat-header h1 {
                font-size: 24px;
            }

            .chat-container {
                height: 80vh;
                border-radius: 10px;
            }

            .chat-input-container {
                padding: 10px;
            }

            .message {
                max-width: 90%;
            }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="chat-header animate__animated animate__fadeInDown">
            <h1>DarkChat AI</h1>
            <p>محادثة مظلمة بدون قيود - استفسر عن أي شيء</p>

        <div class="chat-container animate__animated animate__fadeIn">

                <button class="setting-button" title="الإعدادات">

                </button>
            </div>

                    <div class="message-time">الآن</div>

                <button class="send-button" id="sendButton">
                    <i class="fas fa-paper-plane"></i>

        <div class="disclaimer">

        </div>

    <script>

        const forbiddenWords = ["قتل", "انتحار", "إرهاب", "عنف", "تعذيب"];

        function sendMessage() {
            const messageText = chatInput.value.trim();

            // إضافة رسالة المستخدم
            addMessage(messageText, "user-message");
            chatInput.value = "";

            // عرض مؤشر الكتابة

            chatMessages.scrollTop = chatMessages.scrollHeight;

            // محاكاة رد الذكاء الاصطناعي
            setTimeout(() => {
                typingIndicator.style.display = "none";

                // التحقق من الكلمات المحظورة
                let containsForbidden = false;

                    if (messageText.toLowerCase().includes(word.toLowerCase())) {

                } else if (messageText.toLowerCase().includes("جنس") ||

                    response = getGeneralResponse(messageText);

                // إضافة رد الذكاء الاصطناعي
                addMessage(response, "ai-message");
            }, 1000);
        }

                { keywords: ["تحديات", "صعوبات"], response: "جميع العلاقات تواجه تحديات وصعوبات. إذا كان لديك أسئلة حول كيفية التعامل مع هذه التحديات، فأنا هنا للإجابة." },
                { keywords: ["توازن", "انسجام"], response: "التوازن والانسجام مهمان في العلاقات. إذا كان لديك أسئلة حول كيفية تحقيق التوازن، فأنا هنا للإجابة." },
                { keywords: ["ثقة", "أمان"], response: "الثقة والأمان أساسيات أي علاقة صحية. إذا كان لديك أسئلة حول كيفية بناء الثقة، فأنا هنا للإجابة." },
                { keywords: ["صبر", "تسامح"], response: "الصبر والتسامح جزء مهم من العلاقات الصحية. إذا كان لديك أسئلة حول كيفية تطوير الصبر، فأنا هنا للإجابة." },
                { keywords: ["شجاعة", "قوة"], response: "الشجاعة والقوة يمكن أن تساعد في تجاوز التحديات في العلاقات. إذا كان لديك أسئلة حول هذا الموضوع، فأنا هنا للإجابة." },
                { keywords: ["تطور", "نمو"], response: "التطور والنمو جزء طبيعي من العلاقات. إذا كان لديك أسئلة حول كيفية دعم نمو العلاقات، فأنا هنا للإجابة." },
            ];

            // البحث عن رد مناسب
            for (const pair of adultResponses) {
                for (const keyword of pair.keywords) {
                    if (messageLower.includes(keyword.toLowerCase())) {
                        return pair.response;
                    }
                }
            }

            // رد عام لمواضيع +18
            return "أنا هنا للإجابة عن أسئلتك بشكل عام حول المواضيع الناضجة. إذا كان لديك أسئلة حول العلاقات الصحية أو التثقيف الجنسي، فأنا هنا للإجابة بشكل عام.";
        }

        // إضافة رسالة إلى المحادثة
        function addMessage(text, className) {
            const messageDiv = document.createElement("div");
            messageDiv.className = `message ${className} animate__animated animate__fadeIn`;

            const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            messageDiv.innerHTML = `
                ${text}
                <div class="message-time">${time}</div>
            `;

            chatMessages.appendChild(messageDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        // إرسال الرسالة عند النقر على الزر
        sendButton.addEventListener("click", sendMessage);

        // إرسال الرسالة عند الضغط على Enter
        chatInput.addEventListener("keypress", function(e) {
            if (e.key === "Enter") {
                sendMessage();
            }
        });

        // مسح المحادثة
        document.querySelector(".setting-button:nth-child(1)").addEventListener("click", function() {
            if (confirm("هل أنت متأكد من أنك تريد مسح المحادثة؟")) {
                chatMessages.innerHTML = `
                    <div class="message ai-message animate__animated animate__fadeIn">
                        مرحبا! أنا DarkChat AI، يمكنك سؤالي عن أي شيء بدون قيود.
                        <div class="message-time">الآن</div>
                    </div>
                `;
            }
        });

        // عرض الإعدادات
        document.querySelector(".setting-button:nth-child(2)").addEventListener("click", function() {
            alert("الإعدادات: هذا الإصدار الأولي من DarkChat AI. جميع المحادثات خاصة ولا يتم حفظها.");
        });
    </script>
